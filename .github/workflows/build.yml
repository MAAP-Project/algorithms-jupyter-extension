name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  pre_build:
    name: Run linter & prettier
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install JupyterLab
        run: python -m pip install jupyterlab~=4.4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0

      - name: Install dependencies
        run: jlpm install

      - name: Run ESLint
        run: jlpm run lint:check

      - name: Run Prettier
        run: jlpm run prettier:check

  build:
    runs-on: ubuntu-24.04
    needs: pre_build
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install JupyterLab
        run: python -m pip install jupyterlab~=4.4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0

      - name: Install dependencies
        run: jlpm install

      - name: Build
        run: jlpm run build
